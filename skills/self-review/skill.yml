schema_version: 2
name: self-review
layer: D
owner_domain: own_manuscript_critique
maturity: official
when_to_use:
  - Pre-submission self-criticism on the user's own manuscript across 10 review categories
  - Generating Anticipated Major / Minor Comments before sending to senior co-authors
  - Phase 2.5a numerical source-fidelity audit (CSV ↔ analysis ↔ manuscript ↔ primary paper)
  - Producing R0-numbered comments that flow into /revise for the response document
  - Multi-agent panel review (--panel) — parallel domain-expert reviewers + editor synthesis for a high-stakes pre-submission final pass
when_NOT_to_use:
  - Reviewing external (assigned) manuscripts (use /peer-review)
  - Drafting the user's manuscript (use /write-paper)
  - Generating reviewer-response prose (use /revise)
  - Silently fixing non-AI-fixable issues without surfacing them to the user (forbidden)
inputs:
  - manuscript/manuscript.md
outputs:
  - qc/self_review.md
  - qc/self_review.json
  - qc/reference_adequacy.json
  - qc/refinement_stop.json
  - qc/baseline_drift.json
deterministic_scripts:
  - scripts/check_reference_adequacy.py
  - scripts/check_editorial_impression.py
  - scripts/check_baseline_drift.py
  - scripts/check_table_percentages.py
  - scripts/check_nested_group_comparison.py
  - scripts/check_reported_p_from_counts.py
  - scripts/check_dta_denominators.py
  - scripts/check_paired_difference_estimator.py
side_effects:
  - may_edit_manuscript_when_fix_flag_set
downstream_consumers:
  - revise
  - sync-submission
forbidden_actions:
  - review_external_manuscripts_as_peer_reviewer
  - silently_fix_non_ai_fixable_issues

# v2.1 quality card
purpose: "Pre-submission self-review of the user's own manuscript from a reviewer's perspective across 10 categories, with severity-framed anticipated comments."
safety_boundaries:
  - "Reviews the user's own manuscript only; not for reviewing external (journal-assigned) manuscripts."
  - "Does not silently fix non-AI-fixable issues; it flags them for the author."
known_limitations:
  - "Anticipates likely reviewer comments; cannot predict a specific reviewer's focus."
  - "Advisory; produces recommendations, not manuscript edits."
validation_commands:
  - "python3 scripts/check_reviewer_team_consistency.py"
  - "python3 scripts/check_domain_probe_sync.py --strict"
  - "bash tests/test_panel_mode.sh"
  - "bash tests/test_reference_adequacy.sh"
  - "bash tests/test_editorial_impression.sh"
  - "bash tests/test_rounded_delta.sh"
  - "bash tests/test_figure_citation.sh"
  - "bash tests/test_emphasis_density.sh"
  - "bash tests/test_cv_leakage.sh"
  - "python3 scripts/check_table_percentages.py --manuscript <manuscript.md> --strict  # recompute n (%) cells vs column denominator"
  - "bash scripts/check_table_percentages_challenge/verify.sh  # deterministic, network-free"
  - "bash scripts/check_nested_group_comparison_challenge/verify.sh  # subset-vs-parent P-value comparison"
  - "bash scripts/check_reported_p_from_counts_challenge/verify.sh  # recompute row P from 2x2 counts"
  - "bash scripts/check_dta_denominators_challenge/verify.sh  # sens/spec denominators vs reference-standard counts"
  - "bash scripts/check_paired_difference_estimator_challenge/verify.sh  # median parity / degenerate CI / unnamed estimator"
  - "bash scripts/check_effect_stability_challenge/verify.sh  # CI upper/lower ratio > 10x + events-per-variable < 10"
  - "bash scripts/check_incorporation_bias_challenge/verify.sh  # trajectory reference standard + trajectory predictor"
  - "bash scripts/check_figure_citation_challenge/verify.sh  # panel-suffixed citation (Figure 3a) regression + real orphan"
  - "bash scripts/refinement_stop_challenge/verify.sh  # terminal-state loop controller: zero-edit PASS / stop signal from qc/*.json"
  - "bash scripts/check_baseline_drift_challenge/verify.sh  # framing drift (strength/significance/scope/hedge) vs the last human-approved baseline"
  - "feed R0-numbered output into /revise"
evidence_surface: demo
